<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique Lean</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding-bottom: 60px; }
        header { background-color: #00008b; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo-text { font-weight: bold; font-size: 1.5em; }
        .user-header { background: #000066; color: #ffd700; padding: 5px 20px; font-size: 0.9em; font-weight: bold; text-align: center; }
        .nav-icons { display: flex; align-items: center; gap: 15px; }

        .cart-wrapper { position: relative; display: inline-block; color: white; text-decoration: none; font-weight: bold; margin-right: 5px; }
        .cart-badge { position: absolute; top: -8px; right: -8px; background-color: #ff9800; color: white; border-radius: 50%; padding: 1px 4px; font-size: 0.65em; font-weight: bold; min-width: 12px; height: 12px; display: flex; align-items: center; justify-content: center; }
        .menu-btn { cursor: pointer; font-size: 1.2em; }

        #sideMenu { height: 100%; width: 0; position: fixed; z-index: 1000; top: 0; right: 0; background-color: white; overflow-x: hidden; transition: 0.5s; box-shadow: -2px 0 5px rgba(0,0,0,0.2); }
        .menu-content { padding: 20px; margin-top: 50px; }
        .menu-section-title { font-size: 0.8em; color: #888; margin: 20px 0 10px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .menu-item { display: flex; align-items: center; padding: 12px; cursor: pointer; color: #333; text-decoration: none; font-size: 0.95em; }
        .menu-item:hover { background-color: #f0f0f0; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2em; cursor: pointer; }

        .banner-container { width: 100%; height: 150px; overflow: hidden; position: relative; background: #ddd; }
        .banner-slide { width: 100%; height: 100%; display: flex; transition: transform 0.5s ease-in-out; }
        .banner-slide img { min-width: 100%; height: 100%; object-fit: cover; }

        .filter-section { background: white; padding: 15px; margin: 20px 0; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .filter-label { font-size: 0.8em; color: #777; margin: 10px 0 5px; }
        input, select { width: 100%; padding: 8px; border-radius: 0; border: 1px solid #ddd; outline: none; background: #f9f9f9; box-sizing: border-box; }

        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; }
        .product-card { background: white; padding: 10px; border-radius: 0; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .product-img { width: 100%; height: 100px; background: #eee; border-radius: 0; margin-bottom: 10px; }
        .product-name { font-weight: bold; font-size: 0.9em; }
        .product-price { color: #2e7d32; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="sideMenu">
        <span class="close-btn" onclick="toggleMenu()">&times;</span>
        <div class="menu-content" id="menu-container"></div>
    </div>

    <header>
        <div class="logo-text">Lean</div>
        <div class="nav-icons">
            <a href="panier.html" class="cart-wrapper">
                <i class="fas fa-shopping-cart"></i>
                <span id="compteur-panier" class="cart-badge">0</span>
            </a>
            <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <div class="user-header" id="userNameDisplay">Chargement...</div>

    <div class="banner-container">


<div class="banner-slide" id="slider">
    <img src="pub1.jpg" alt="Pub 1">
    <img src="pub2.jpg" alt="Pub 2">
    <img src="pub3.jpg" alt="Pub 3">
</div>


    </div>

    <div class="filter-section">
        <div class="filter-label">Rechercher</div>
        <input type="text" id="searchInput" placeholder="Nom du produit..." onkeyup="filtrerProduits()">

        <div class="filter-label">Catégorie</div>
        <select id="catFilter" onchange="filtrerProduits()">
            <option value="Tous">Toutes les catégories</option>
        </select>
    </div>

    <h3 style="margin: 20px;">Nos produits</h3>
    <div class="product-grid" id="product-container"></div>

    <script>
        let currentSlide = 0;
        const slider = document.getElementById('slider');
        setInterval(() => {
            currentSlide = (currentSlide + 1) % 3;
            slider.style.transform = `translateX(-${currentSlide * 100}%)`;
        }, 3000);

        localStorage.setItem('userRole', 'admin');

        function mettreAJourCompteur() {
            const panier = JSON.parse(localStorage.getItem('panier')) || [];
            const badge = document.getElementById('compteur-panier');
            badge.innerText = panier.length;
            badge.style.display = panier.length > 0 ? 'flex' : 'none';
        }
        mettreAJourCompteur();

        const savedName = localStorage.getItem('userName');
        document.getElementById('userNameDisplay').textContent = savedName ? "Bienvenue, " + savedName : "Bienvenue, Invité";

        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            menu.style.width = menu.style.width === "280px" ? "0" : "280px";
        }

        const menuStructure = [
            { type: 'item', icon: "fa-user", text: "Mon Profil", link: "profil.html" },
            { type: 'item', icon: "fa-shield-alt", text: "Sécurité", link: "securite.html" },
            { type: 'item', icon: "fa-box", text: "Vos commandes", link: "commandes.html" },
            { type: 'title', text: "NOS CATÉGORIES" },
            { type: 'item', icon: "fa-sign-out-alt", text: "Déconnexion", action: "deconnexion()" }
        ];

        const container = document.getElementById('menu-container');
        if (localStorage.getItem('userRole') === 'admin') {
            container.innerHTML += `<div class="menu-section-title">ADMINISTRATION</div>`;
            container.innerHTML += `<div class="menu-item" onclick="window.location.href='boite-reception.html'"><i class="fas fa-envelope" style="margin-right:15px; width:20px;"></i> Boîte de réception</div>`;
            container.innerHTML += `<div class="menu-item" onclick="window.location.href='ajout.html'"><i class="fas fa-plus-circle" style="margin-right:15px; width:20px;"></i> Ajouter un produit</div>`;
        }

        menuStructure.forEach(item => {
            if (item.type === 'title') {
                container.innerHTML += `<div class="menu-section-title">${item.text}</div>`;
            } else {
                const el = document.createElement('div');
                el.className = "menu-item";
                el.innerHTML = `<i class="fas ${item.icon}" style="margin-right:15px; width:20px;"></i> ${item.text}`;
                el.onclick = () => { item.action ? eval(item.action) : (item.link && item.link !== "#" ? window.location.href = item.link : null); };
                container.appendChild(el);
            }
        });

        function deconnexion() {
            if(confirm("Voulez-vous vraiment vous déconnecter ?")) {
                localStorage.removeItem('userName'); localStorage.removeItem('userRole');
                window.location.href = 'login.html';
            }
        }

        let tousLesProduits = [];
        // Mise à jour de l'appel vers l'API au lieu du fichier .json
        fetch('/api/produits').then(res => res.json()).then(data => {
            tousLesProduits = data;
            const select = document.getElementById('catFilter');
            [...new Set(data.map(p => p.categorie))].forEach(cat => {
                const opt = document.createElement('option'); opt.value = cat; opt.textContent = cat;
                select.appendChild(opt);
            });
            afficherProduits(data);
        });

        function afficherProduits(liste) {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            liste.forEach(p => {
                container.innerHTML += `
                    <div class="product-card" onclick="window.location.href='produit.html?id=${p.id}'">
                        <img src="${p.image}" class="product-img" alt="${p.nom}">
                        <div class="product-name">${p.nom}</div>
                        <div class="product-price">${p.prix} XOF</div>
                    </div>`;
            });
        }

        function filtrerProduits() {
            const rech = document.getElementById('searchInput').value.toLowerCase();
            const cat = document.getElementById('catFilter').value;
            afficherProduits(tousLesProduits.filter(p => (p.nom.toLowerCase().includes(rech)) && (cat === "Tous" || p.categorie === cat)));
        }


window.onerror = function(message, source, lineno, colno, error) {
    alert("Erreur JS : " + message);
};


    </script>
</body>
</html>
