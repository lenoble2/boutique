<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - LeanPay</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; }
        h2 { text-align: center; color: #00008b; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-submit { background: #00008b; color: white; padding: 15px; border-radius: 15px; border: none; width: 100%; margin-top: 25px; cursor: pointer; }
        .btn-submit:hover { background: #000066; }
        .login-link { text-align: center; margin-top: 20px; font-size: 0.9em; }
        .login-link a { color: #00008b; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>Inscription Lean</h2>
        <form id="signupForm">
            <label for="nom">Nom complet</label>
            <input type="text" id="nom" required>

            <label for="email">Adresse E-mail</label>
            <input type="email" id="email" required>

            <label for="phone">N° ☎️ (Votre Identifiant)</label>
            <input type="tel" id="phone" placeholder="Ex: 0707070707" required>

            <label for="password">Mot de passe</label>
            <input type="password" id="password" required>

            <label for="confirmPassword">Confirmer le mot de passe</label>
            <input type="password" id="confirmPassword" required>

            <button type="submit" class="btn-submit">S'inscrire</button>
        </form>

        <div class="login-link">
            Déjà inscrit ? <a href="login.html">Connexion</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert("Les mots de passe ne correspondent pas !");
                return;
            }

            const userData = {
                nom: document.getElementById('nom').value,
                email: document.getElementById('email').value,
                id: document.getElementById('phone').value,
                password: password
            };

            fetch('/api/inscription', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            })
            .then(response => response.json().then(data => {
                if (!response.ok) throw new Error(data.message || "Erreur lors de l'inscription");
                return data;
            }))
            .then(data => {
                alert(data.message);
                // Redirection vers la page de connexion au lieu du catalogue
                window.location.href = 'login.html'; 
            })
            .catch(error => {
                console.error("Erreur :", error);
                alert(error.message);
            });
        });
    </script>
</body>
</html>
